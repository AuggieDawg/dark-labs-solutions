name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-only-secret-not-for-production
      GOOGLE_CLIENT_ID: ci-client-id
      GOOGLE_CLIENT_SECRET: ci-client-secret
      OWNER_EMAILS: ci@example.com
      PRIMARY_WORKSPACE_SLUG: dark-labs
      PRIMARY_WORKSPACE_NAME: Dark Labs
      CONTACT_FORM_ENABLED: "true"
      LEAD_ABUSE_HASH_SECRET: ci-only-lead-abuse-secret-at-least-32-characters
      LEAD_NOTIFICATION_EMAIL: leads@example.com
      LEAD_FROM_EMAIL: leads@example.com
      RESEND_API_KEY: re_ci_only_not_used_for_network_calls
      CRON_SECRET: ci-only-cron-secret-at-least-32-characters

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply database migrations
        run: npm run db:deploy

      - name: Test
        run: npm test

      - name: Test database integration
        run: npm run test:integration

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build:check
