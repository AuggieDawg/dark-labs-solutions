name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-only-secret-not-for-production
      GOOGLE_CLIENT_ID: ci-client-id
      GOOGLE_CLIENT_SECRET: ci-client-secret
      OWNER_EMAILS: ci@example.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build:check
